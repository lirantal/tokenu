# npm security best practices
# Source: https://github.com/lirantal/npm-security-best-practices


# Require at least 30 days since package release (specified in minutes)
minimumReleaseAge: 43200

# Fail if a package's trust level has decreased (pnpm 10.21+)
trustPolicy: no-downgrade

# Allow specific packages or versions to bypass the check when needed
# example:
# trustPolicyExclude:
#   - 'chokidar@4.0.3'
#   - 'webpack@4.47.0 || 5.102.1'

# Ignore the check for packages published more than 30 days ago (pnpm 10.27+)
# Useful for older packages that pre-date provenance support
# trustPolicyIgnoreAfter: 43200

allowBuilds:
  esbuild: true
  rolldown: true
  unrs-resolver: true

# Strictly enforce build dependencies, otherwise pnpm will error
strictDepBuilds: true

# Block exotic subdependencies such as those pulled from  Git sources
blockExoticSubdeps: true

trustPolicyExclude:
  - '@oxc-resolver/binding-darwin-arm64@9.0.2'
  - '@oxc-resolver/binding-darwin-x64@9.0.2'
  - '@oxc-resolver/binding-linux-arm64-gnu@9.0.2'
  - '@oxc-resolver/binding-linux-x64-gnu@9.0.2'
  - '@oxc-resolver/binding-win32-arm64-msvc@9.0.2'
  - '@oxc-resolver/binding-win32-x64-msvc@9.0.2'
  - '@oxc-transform/binding-darwin-arm64@0.67.0'
  - '@oxc-transform/binding-darwin-x64@0.67.0'
  - '@oxc-transform/binding-linux-arm-gnueabihf@0.67.0'
  - '@oxc-transform/binding-linux-arm64-gnu@0.67.0'
  - '@oxc-transform/binding-linux-arm64-musl@0.67.0'
  - '@oxc-transform/binding-linux-x64-gnu@0.67.0'
  - '@oxc-transform/binding-linux-x64-musl@0.67.0'
  - '@oxc-transform/binding-wasm32-wasi@0.67.0'
  - '@oxc-transform/binding-win32-arm64-msvc@0.67.0'
  - '@oxc-transform/binding-win32-x64-msvc@0.67.0'
  - 'chokidar@4.0.3'
  - 'eslint-import-resolver-typescript@3.10.1'
  - 'semver@6.3.1'
